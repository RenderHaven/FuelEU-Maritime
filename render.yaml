# render.yaml

services:

# 🔷 Backend (Node Service)

- type: web
  name: fueleu-backend
  env: node
  autoDeploy: true

  buildCommand: npm install && npm run build

  startCommand: sh -c "npm run db:setup && npm run start"

  envVars:

  - key: NODE_ENV
    value: production

  - key: DATABASE_URL
    fromDatabase:
      name: fueleu-db
      property: connectionString

# 🔶 Frontend (Static Site)

- type: web
  name: fueleu-frontend
  env: static
  autoDeploy: true

  buildCommand: npm install && npm run build
  staticPublishPath: dist

  envVars:

  - key: API_BASE_URL
    value: https://fueleu-backend.onrender.com

databases:

- name: fueleu-db
